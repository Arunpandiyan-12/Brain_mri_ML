version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain-triage-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
      - ./backend/brain_triage.db:/app/brain_triage.db
      - ./backend/ml/weights:/app/ml/weights
    environment:
      - SECRET_KEY=change-this-in-production-very-long-secret-key
      - DATABASE_URL=sqlite+aiosqlite:///./brain_triage.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brain-triage-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    restart: unless-stopped

volumes:
  static_files:
